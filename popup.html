<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ServPro Helper</title>
    <link rel="stylesheet" href="src/ui/theme.css" />
    <link rel="stylesheet" href="src/ui/popup.css" />
  </head>
  <body>
    <div class="popup-wrap">
      <div class="popup-head">
        <img src="icon-48.png" alt="" />
        <div class="popup-head-text">
          <h1>ServPro Helper</h1>
          <p id="activationLine" class="popup-sub">Checking access…</p>
        </div>
      </div>
      <div class="popup-theme-row">
        <label for="popupDarkMode">
          <input type="checkbox" id="popupDarkMode" />
          Dark mode
        </label>
      </div>
      <div class="popup-actions">
        <a id="openSettings" class="sp-btn block" href="#">Settings</a>
        <button type="button" id="openFnol" class="sp-btn block hidden">First Notice of Loss</button>
        <button type="button" id="openAddJob" class="sp-btn secondary block hidden">Open jobs list</button>
      </div>
      <p id="popupStatus" class="popup-status"></p>
    </div>
    <script src="src/lib/settings.js"></script>
    <script src="src/lib/selectors.js"></script>
    <script src="src/ui/theme.js"></script>
    <script src="src/ui/popup.js"></script>
  </body>
</html>
