<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ServPro Helper</title>
    <style>
      body {
        margin: 0;
        min-width: 260px;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        color: #1e293b;
        background: #fff;
      }
      .wrap {
        padding: 12px;
      }
      .head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .head img {
        width: 32px;
        height: 32px;
      }
      h1 {
        margin: 0;
        font-size: 15px;
      }
      .sub {
        margin: 2px 0 0;
        color: #64748b;
        font-size: 11px;
      }
      .btn {
        display: block;
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 8px;
        padding: 8px 10px;
        border: 1px solid #1976d2;
        background: #1976d2;
        color: #fff;
        border-radius: 6px;
        font: inherit;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
      }
      .btn.secondary {
        background: #fff;
        color: #334e68;
        border-color: #cbd5e1;
      }
      .btn.hidden {
        display: none;
      }
      .status {
        font-size: 12px;
        color: #64748b;
        margin-top: 4px;
      }
      .status.ok {
        color: #027a48;
      }
      .status.error {
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <img src="icon-48.png" alt="" />
        <div>
          <h1>ServPro Helper</h1>
          <p id="activationLine" class="sub">Checking access…</p>
        </div>
      </div>
      <a id="openSettings" class="btn" href="#">Settings</a>
      <button type="button" id="openFnol" class="btn hidden">First Notice of Loss</button>
      <button type="button" id="openAddJob" class="btn secondary hidden">Open add job</button>
      <p id="popupStatus" class="status"></p>
    </div>
    <script src="src/lib/settings.js"></script>
    <script src="src/lib/selectors.js"></script>
    <script src="src/ui/popup.js"></script>
  </body>
</html>
